services:
  # -------------------------------------------------------------------------
  # Nginx reverse proxy — OPTIONAL
  # Start with:  docker compose --profile nginx up -d
  # Skip when you already have a reverse proxy (Traefik, Caddy, host nginx).
  # Without this profile the app is reachable directly on APP_PORT (8080).
  # -------------------------------------------------------------------------
  nginx:
    profiles: [nginx]
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - relaticle
    depends_on:
      app:
        condition: service_healthy

  app:
    image: ${IMAGE_NAME:-ghcr.io/boroborovski/erp-crm:latest}
    restart: always
    ports:
      - "${APP_PORT:-8080}:8080"   # direct access; ignored when nginx profile is active
    environment:
      APP_NAME: ${APP_NAME:-Relaticle}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      APP_URL: ${APP_URL:-http://localhost}
      APP_LOCALE: ${APP_LOCALE:-en}
      APP_PANEL_DOMAIN: ${APP_PANEL_DOMAIN:-}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-relaticle}
      DB_USERNAME: ${DB_USERNAME:-relaticle}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: redis
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Relaticle}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USERNAME: ${IMAP_USERNAME:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_ENCRYPTION: ${IMAP_ENCRYPTION:-ssl}
      ADMIN_NAME: ${ADMIN_NAME:-Admin User}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@relaticle.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
      ADMIN_TEAM_NAME: ${ADMIN_TEAM_NAME:-My Team}
      SYSADMIN_EMAIL: ${SYSADMIN_EMAIL:-sysadmin@relaticle.local}
      SYSADMIN_PASSWORD: ${SYSADMIN_PASSWORD:-password}
      SYSADMIN_PATH: ${SYSADMIN_PATH:-sysadmin}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_URL: ${AWS_URL:-}
      LANDING_LOGO_CUSTOM_PATH: ${LANDING_LOGO_CUSTOM_PATH:-}
      LANDING_HERO_BANNER_IMAGE: ${LANDING_HERO_BANNER_IMAGE:-}
      FATHOM_ANALYTICS_SITE_ID: ${FATHOM_ANALYTICS_SITE_ID:-}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      STOCK_ALERTS_ENABLED: ${STOCK_ALERTS_ENABLED:-false}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      # serversideup/php Laravel automations
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_MIGRATION: "true"
      AUTORUN_LARAVEL_MIGRATION_ISOLATION: "true"
    volumes:
      - storage:/var/www/html/storage/app
      - brand:/var/www/html/public/brand
    networks:
      - relaticle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  horizon:
    image: ${IMAGE_NAME:-erp-crm:latest}
    restart: always
    command: ["php", "/var/www/html/artisan", "horizon"]
    stop_signal: SIGTERM
    environment:
      APP_NAME: ${APP_NAME:-Relaticle}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      APP_PANEL_DOMAIN: ${APP_PANEL_DOMAIN:-}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-relaticle}
      DB_USERNAME: ${DB_USERNAME:-relaticle}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Relaticle}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USERNAME: ${IMAP_USERNAME:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_ENCRYPTION: ${IMAP_ENCRYPTION:-ssl}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_URL: ${AWS_URL:-}
      LANDING_LOGO_CUSTOM_PATH: ${LANDING_LOGO_CUSTOM_PATH:-}
      LANDING_HERO_BANNER_IMAGE: ${LANDING_HERO_BANNER_IMAGE:-}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      STOCK_ALERTS_ENABLED: ${STOCK_ALERTS_ENABLED:-false}
      # Disable automations for worker container
      AUTORUN_ENABLED: "false"
    volumes:
      - storage:/var/www/html/storage/app
      - brand:/var/www/html/public/brand
    networks:
      - relaticle
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck-horizon"]
      start_period: 10s

  scheduler:
    image: ${IMAGE_NAME:-erp-crm:latest}
    restart: always
    command: ["php", "/var/www/html/artisan", "schedule:work"]
    stop_signal: SIGTERM
    environment:
      APP_NAME: ${APP_NAME:-Relaticle}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      APP_PANEL_DOMAIN: ${APP_PANEL_DOMAIN:-}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-relaticle}
      DB_USERNAME: ${DB_USERNAME:-relaticle}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Relaticle}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USERNAME: ${IMAP_USERNAME:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_ENCRYPTION: ${IMAP_ENCRYPTION:-ssl}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_URL: ${AWS_URL:-}
      LANDING_LOGO_CUSTOM_PATH: ${LANDING_LOGO_CUSTOM_PATH:-}
      LANDING_HERO_BANNER_IMAGE: ${LANDING_HERO_BANNER_IMAGE:-}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      STOCK_ALERTS_ENABLED: ${STOCK_ALERTS_ENABLED:-false}
      # Disable automations for scheduler container
      AUTORUN_ENABLED: "false"
    volumes:
      - storage:/var/www/html/storage/app
      - brand:/var/www/html/public/brand
    networks:
      - relaticle
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck-schedule"]
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-relaticle}
      POSTGRES_USER: ${DB_USERNAME:-relaticle}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - relaticle
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-relaticle} -d ${DB_DATABASE:-relaticle}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\";
      else
        redis-server --appendonly yes;
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    networks:
      - relaticle
    healthcheck:
      test: >
        sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-cli -a \"$$REDIS_PASSWORD\" ping;
        else
          redis-cli ping;
        fi"
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  relaticle:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  storage:
  brand:
